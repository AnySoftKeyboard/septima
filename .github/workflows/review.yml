name: AI Code Review
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  review:
    name: Cassandra Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important: fetch all history for diffing

      - name: Run Cassandra AI Review
        uses: menny/cassandra@c31e5c67624ca33ee7094b567e4d14a96639fe8b
        with:
          provider: 'google'
          model_id: 'gemini-3-flash-preview'
          provider_api_key: ${{ secrets.GEMINI_API_KEY }}
          # The base branch to compare against (defaults to main)
          base: ${{ github.event.pull_request.base.sha }}
          # The head branch/commit (defaults to HEAD)
          head: ${{ github.event.pull_request.head.sha }}
