name: AI Code Review
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  review:
    name: Cassandra Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important: fetch all history for diffing

      - name: Run Cassandra AI Review
        uses: menny/cassandra@6a890371ab2a510e64dfc7a80cdd857487ab944b
        with:
          provider: 'google'
          model_id: 'gemini-3-flash-preview'
          provider_api_key: ${{ secrets.GEMINI_API_KEY }}
          # The base branch to compare against (defaults to main)
          base: ${{ github.event.pull_request.base.sha }}
          # The head branch/commit (defaults to HEAD)
          head: ${{ github.event.pull_request.head.sha }}
          # The GitHub token to use for review comments
          reviewer_github_token: ${{ secrets.BOT_MASTER_RW_GITHUB_TOKEN }}
